<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBN1 – Nazária Distribuidora Farmacêutica</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6B00">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-fade-up { animation: fadeUp 0.7s ease both; }
    .anim-delay-1 { animation-delay: 0.15s; }
    .anim-delay-2 { animation-delay: 0.30s; }
    .anim-delay-3 { animation-delay: 0.50s; }

    .btn-iniciar {
      background: linear-gradient(135deg, #FF6B00 0%, #e55300 100%);
      box-shadow: 0 8px 30px rgba(255,107,0,0.40);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn-iniciar:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(255,107,0,0.50);
    }
    .btn-iniciar:active { transform: scale(0.97); }

    .logo-parceiro {
      filter: grayscale(100%);
      opacity: 0.55;
      transition: filter 0.25s, opacity 0.25s;
    }
    .logo-parceiro:hover {
      filter: grayscale(0%);
      opacity: 1;
    }
  </style>
</head>
<body class="min-h-screen bg-white font-sans antialiased">

  <!-- LAYOUT DOIS PAINÉIS -->
  <div class="min-h-screen flex flex-col lg:flex-row">

    <!-- PAINEL ESQUERDO: LOGIN -->
    <div class="w-full lg:w-[480px] xl:w-[520px] flex flex-col justify-between p-8 lg:p-12 bg-white shrink-0 min-h-screen lg:min-h-screen border-r border-slate-100">

      <!-- Logo topo -->
      <div class="anim-fade-up">
        <img src="https://epedidos.nazaria.com.br/img/logo-nazaria-white.png"
          alt="Nazária" class="h-14 w-auto object-contain bg-[#FF6B00] rounded-2xl px-5 py-2.5 shadow-lg"
          onerror="this.style.display='none'">
        <p class="text-xs font-bold text-slate-400 tracking-widest uppercase mt-2">Distribuidora Farmacêutica</p>
      </div>

      <!-- Formulário centralizado -->
      <div class="anim-fade-up anim-delay-1 flex flex-col gap-6 max-w-sm w-full mx-auto lg:mx-0">
        <div>
          <h1 class="text-4xl font-bold text-slate-900 tracking-tight leading-tight">Catálogo de<br>Pedidos</h1>
          <p class="text-slate-400 text-sm mt-2">Acesse o catálogo completo de produtos HBN1.</p>
        </div>

        <div class="flex flex-col gap-3">
          <div class="relative">
            <input type="text" id="inputUsuario" placeholder="Usuário"
              class="w-full h-12 pl-11 pr-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#FF6B00] focus:border-transparent transition-all"
              onkeydown="if(event.key==='Enter') document.getElementById('inputSenha').focus()">
            <svg class="w-4 h-4 text-slate-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
          <div class="relative">
            <input type="password" id="inputSenha" placeholder="Senha"
              class="w-full h-12 pl-11 pr-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#FF6B00] focus:border-transparent transition-all"
              onkeydown="if(event.key==='Enter') iniciarPedido()">
            <svg class="w-4 h-4 text-slate-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-2a6 6 0 11-12 0 6 6 0 0112 0z M6 11v4a2 2 0 002 2h8a2 2 0 002-2v-4"/>
            </svg>
          </div>
          <p id="msgErroLogin" class="hidden text-xs font-bold text-red-500 -mt-1"></p>
        </div>

        <button onclick="iniciarPedido()" id="btnIniciarPedido"
          class="btn-iniciar w-full text-white font-semibold text-base rounded-2xl py-4 cursor-pointer select-none tracking-wide">
          <span id="btnIniciarTexto">Iniciar Pedido HBN1</span>
          <span class="block text-xs font-normal text-orange-100 mt-0.5 opacity-80">
            Informe usuário e senha para entrar
          </span>
        </button>
      </div>

      <!-- Rodapé -->
      <p class="text-xs text-slate-400 font-medium">
        &copy; <span id="anoAtual"></span> LUCAS JOSE ADM · HBN1
      </p>
    </div>

    <!-- PAINEL DIREITO: PARCEIROS -->
    <div class="hidden lg:flex flex-col flex-grow bg-slate-50 items-center justify-center p-12 gap-10">
      <div class="text-center">
        <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Nossos Parceiros</p>
        <h2 class="text-2xl font-black text-slate-800">Marcas que trabalhamos</h2>
      </div>
      <div class="grid grid-cols-2 gap-8 w-full max-w-md">
        <div class="bg-white rounded-2xl p-8 flex items-center justify-center shadow-sm border border-slate-100 aspect-video">
          <img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/DANONE_LOGO_HORIZONTAL.png" alt="Danone" class="h-10 w-auto object-contain">
        </div>
        <div class="bg-white rounded-2xl p-8 flex items-center justify-center shadow-sm border border-slate-100 aspect-video">
          <img src="https://www.celegence.com/wp-content/uploads/2025/06/Kenvue.webp" alt="Kenvue" class="h-9 w-auto object-contain">
        </div>
        <div class="bg-white rounded-2xl p-8 flex items-center justify-center shadow-sm border border-slate-100 aspect-video">
          <img src="https://embalagemmarca.com.br/wp-content/uploads/2025/11/Kimberly-Logo.jpg" alt="Kimberly" class="h-9 w-auto object-contain">
        </div>
        <div class="bg-white rounded-2xl p-8 flex items-center justify-center shadow-sm border border-slate-100 aspect-video">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/OMRON_Logo.svg/1280px-OMRON_Logo.svg.png" alt="Omron" class="h-8 w-auto object-contain">
        </div>
        <div class="bg-white rounded-2xl p-8 flex items-center justify-center shadow-sm border border-slate-100 aspect-video col-span-2">
          <img src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Unilever_logo.png" alt="Unilever" class="h-10 w-auto object-contain">
        </div>
      </div>
    </div>

  </div>

  <script src="api.js"></script>
  <script>
  document.getElementById('anoAtual').innerText = new Date().getFullYear();

  async function iniciarPedido() {
    const usuario = document.getElementById('inputUsuario').value.trim();
    const senha   = document.getElementById('inputSenha').value.trim();
    const msgErro = document.getElementById('msgErroLogin');
    const btn     = document.getElementById('btnIniciarPedido');
    const btnTexto = document.getElementById('btnIniciarTexto');

    msgErro.classList.add('hidden');
    msgErro.innerText = '';

    if (usuario === '' || senha === '') {
      msgErro.innerText = 'Preencha usuário e senha para continuar.';
      msgErro.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.classList.add('opacity-60', 'cursor-wait');
    btnTexto.innerText = 'VERIFICANDO...';

    try {
      const resposta = await chamarApi('login', { usuario: usuario, senha: senha });

      if (resposta && resposta.sucesso) {
        btnTexto.innerText = 'ACESSO LIBERADO...';
        const uf = resposta.uf || 'PI';
        localStorage.setItem('hbn1_usuario', usuario);
        localStorage.setItem('hbn1_uf', uf);
        localStorage.setItem('hbn1_nome', resposta.nome || usuario);
        window.location.href = 'catalogo.html?uf=' + encodeURIComponent(uf);
      } else {
        msgErro.innerText = (resposta && resposta.mensagem) ? resposta.mensagem : 'Usuário ou senha incorretos.';
        msgErro.classList.remove('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-60', 'cursor-wait');
        btnTexto.innerText = 'INICIAR PEDIDO HBN1!!';
      }
    } catch (erro) {
      msgErro.innerText = 'Erro ao validar login. Tente novamente.';
      msgErro.classList.remove('hidden');
      btn.disabled = false;
      btn.classList.remove('opacity-60', 'cursor-wait');
      btnTexto.innerText = 'INICIAR PEDIDO HBN1!!';
    }
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>

</body>
</html>
