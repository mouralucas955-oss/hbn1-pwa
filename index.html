<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBN1 – Nazária Distribuidora Farmacêutica</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#FF6B00">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-fade-up { animation: fadeUp 0.7s ease both; }
    .anim-delay-1 { animation-delay: 0.15s; }
    .anim-delay-2 { animation-delay: 0.30s; }
    .anim-delay-3 { animation-delay: 0.50s; }

    .btn-iniciar {
      background: linear-gradient(135deg, #FF6B00 0%, #e55300 100%);
      box-shadow: 0 8px 30px rgba(255,107,0,0.40);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn-iniciar:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(255,107,0,0.50);
    }
    .btn-iniciar:active { transform: scale(0.97); }

    .logo-parceiro {
      filter: grayscale(100%);
      opacity: 0.55;
      transition: filter 0.25s, opacity 0.25s;
    }
    .logo-parceiro:hover {
      filter: grayscale(0%);
      opacity: 1;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center font-sans antialiased px-4 py-12">

  <!-- CARD CENTRAL -->
  <div class="w-full max-w-xl bg-white rounded-3xl shadow-2xl border border-slate-100 p-10 flex flex-col items-center gap-8">

    <!-- LOGO -->
    <div class="anim-fade-up flex flex-col items-center gap-2">
      <img
        src="https://epedidos.nazaria.com.br/img/logo-nazaria-white.png"
        alt="Nazária Distribuidora Farmacêutica"
        class="h-16 w-auto object-contain bg-[#FF6B00] rounded-2xl px-5 py-3 shadow-lg"
        onerror="this.style.display='none'"
      >
      <p class="text-sm font-semibold text-slate-500 tracking-wide mt-1">Distribuidora Farmacêutica</p>
    </div>

    <!-- TÍTULO -->
    <div class="anim-fade-up anim-delay-1 text-center">
      <h1 class="text-3xl font-black text-slate-900 tracking-tight leading-tight">
        Catálogo de Pedidos
      </h1>
      <p class="text-slate-400 text-sm mt-2 font-medium">
        Acesse o catálogo completo de produtos HBN1.
      </p>
    </div>

    <!-- LOGIN: USUÁRIO E SENHA -->
    <div class="anim-fade-up anim-delay-2 w-full flex flex-col gap-3">
      <div class="relative">
        <input type="text" id="inputUsuario" placeholder="Usuário"
          class="w-full h-12 pl-11 pr-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#FF6B00] focus:border-transparent transition-all"
          onkeydown="if(event.key==='Enter') document.getElementById('inputSenha').focus()">
        <svg class="w-4 h-4 text-slate-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <div class="relative">
        <input type="password" id="inputSenha" placeholder="Senha"
          class="w-full h-12 pl-11 pr-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#FF6B00] focus:border-transparent transition-all"
          onkeydown="if(event.key==='Enter') iniciarPedido()">
        <svg class="w-4 h-4 text-slate-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-2a6 6 0 11-12 0 6 6 0 0112 0z M6 11v4a2 2 0 002 2h8a2 2 0 002-2v-4"/>
        </svg>
      </div>
      <p id="msgErroLogin" class="hidden text-xs font-bold text-red-500 text-center -mt-1"></p>
    </div>

    <!-- BOTÃO -->
    <button onclick="iniciarPedido()" id="btnIniciarPedido" class="btn-iniciar block w-full text-center text-white font-black text-lg uppercase tracking-widest rounded-2xl py-5 cursor-pointer select-none">
  <span id="btnIniciarTexto">INICIAR PEDIDO HBN1!!</span>
  <span class="block text-xs font-semibold normal-case tracking-normal text-orange-100 mt-1 opacity-90">
    Informe usuário e senha para entrar no catálogo
  </span>
</button>

    <!-- PARCEIROS -->
    <div class="anim-fade-up anim-delay-3 w-full">
      <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center mb-4">Nossos Parceiros</p>
      <div class="flex flex-wrap items-center justify-center gap-4">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/DANONE_LOGO_HORIZONTAL.png"   alt="Danone"       class="logo-parceiro h-8 w-auto object-contain">
        <img src="https://www.celegence.com/wp-content/uploads/2025/06/Kenvue.webp"                  alt="Kenvue"       class="logo-parceiro h-7 w-auto object-contain">
        <img src="https://embalagemmarca.com.br/wp-content/uploads/2025/11/Kimberly-Logo.jpg"        alt="Kimberly"     class="logo-parceiro h-7 w-auto object-contain">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/OMRON_Logo.svg/1280px-OMRON_Logo.svg.png" alt="Omron" class="logo-parceiro h-6 w-auto object-contain">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Unilever_logo.png"             alt="Unilever"     class="logo-parceiro h-8 w-auto object-contain">
      </div>
    </div>

  </div>

  <!-- RODAPÉ -->
  <p class="mt-8 text-xs text-slate-400 font-medium text-center">
    &copy; <span id="anoAtual"></span> LUCAS JOSE ADM · HBN1
  </p>

  <script src="api.js"></script>
  <script>
  document.getElementById('anoAtual').innerText = new Date().getFullYear();

  async function iniciarPedido() {
    const usuario = document.getElementById('inputUsuario').value.trim();
    const senha   = document.getElementById('inputSenha').value.trim();
    const msgErro = document.getElementById('msgErroLogin');
    const btn     = document.getElementById('btnIniciarPedido');
    const btnTexto = document.getElementById('btnIniciarTexto');

    msgErro.classList.add('hidden');
    msgErro.innerText = '';

    if (usuario === '' || senha === '') {
      msgErro.innerText = 'Preencha usuário e senha para continuar.';
      msgErro.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.classList.add('opacity-60', 'cursor-wait');
    btnTexto.innerText = 'VERIFICANDO...';

    try {
      const resposta = await chamarApi('login', { usuario: usuario, senha: senha });

      if (resposta && resposta.sucesso) {
        btnTexto.innerText = 'ACESSO LIBERADO...';
        const uf = resposta.uf || 'PI';
        localStorage.setItem('hbn1_usuario', usuario);
        localStorage.setItem('hbn1_uf', uf);
        localStorage.setItem('hbn1_nome', resposta.nome || usuario);
        window.location.href = 'catalogo.html?uf=' + encodeURIComponent(uf);
      } else {
        msgErro.innerText = (resposta && resposta.mensagem) ? resposta.mensagem : 'Usuário ou senha incorretos.';
        msgErro.classList.remove('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-60', 'cursor-wait');
        btnTexto.innerText = 'INICIAR PEDIDO HBN1!!';
      }
    } catch (erro) {
      msgErro.innerText = 'Erro ao validar login. Tente novamente.';
      msgErro.classList.remove('hidden');
      btn.disabled = false;
      btn.classList.remove('opacity-60', 'cursor-wait');
      btnTexto.innerText = 'INICIAR PEDIDO HBN1!!';
    }
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
  }
</script>

</body>
</html>
